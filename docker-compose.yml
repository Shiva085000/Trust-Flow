services:
  backend:
    build: ./backend
    container_name: hackstrom_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ORGANIZER_API_KEY=${ORGANIZER_API_KEY:-}
      - ORGANIZER_API_BASE=${ORGANIZER_API_BASE:-https://api.openai.com/v1}
      - ORGANIZER_CHAT_MODEL=${ORGANIZER_CHAT_MODEL:-gpt-4o}
      - ORGANIZER_REASON_MODEL=${ORGANIZER_REASON_MODEL:-gpt-5.4}
      - ORGANIZER_EMBED_MODEL=${ORGANIZER_EMBED_MODEL:-text-embedding-3-large}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - UPLOAD_DIR=uploads
      - REDIS_URL=redis://redis:6379/0
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-hackstrom-secret-change-in-prod}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-}
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hackstrom_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hackstrom_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: hackstrom_worker_1
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ORGANIZER_API_KEY=${ORGANIZER_API_KEY:-}
      - ORGANIZER_API_BASE=${ORGANIZER_API_BASE:-https://api.openai.com/v1}
      - ORGANIZER_CHAT_MODEL=${ORGANIZER_CHAT_MODEL:-gpt-4o}
      - ORGANIZER_REASON_MODEL=${ORGANIZER_REASON_MODEL:-gpt-5.4}
      - ORGANIZER_EMBED_MODEL=${ORGANIZER_EMBED_MODEL:-text-embedding-3-large}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-hackstrom-secret-change-in-prod}
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    volumes:
      - uploads_data:/app/uploads
      - tmp_data:/tmp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker2:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: hackstrom_worker_2
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ORGANIZER_API_KEY=${ORGANIZER_API_KEY:-}
      - ORGANIZER_API_BASE=${ORGANIZER_API_BASE:-https://api.openai.com/v1}
      - ORGANIZER_CHAT_MODEL=${ORGANIZER_CHAT_MODEL:-gpt-4o}
      - ORGANIZER_REASON_MODEL=${ORGANIZER_REASON_MODEL:-gpt-5.4}
      - ORGANIZER_EMBED_MODEL=${ORGANIZER_EMBED_MODEL:-text-embedding-3-large}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-hackstrom-secret-change-in-prod}
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    volumes:
      - uploads_data:/app/uploads
      - tmp_data:/tmp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: hackstrom_flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: hackstrom_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: trustflow_prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=24h'
      - '--web.enable-lifecycle'
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.2.0
    container_name: hackstrom_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hackstrom2026
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/grafana/provisioning:/etc/grafana/provisioning
      - ./backend/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
  tmp_data:
  grafana_data:
