apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustflow-ingress
  namespace: trust-flow
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120s"
spec:
  ingressClassName: nginx
  rules:
  - host: trustflow.local
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /uploads/
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
