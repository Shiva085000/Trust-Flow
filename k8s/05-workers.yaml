apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-workers
  namespace: trust-flow
spec:
  # minimum 2 workers for parallelisation as per judging criteria
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: worker
        image: trustflow/backend:latest
        imagePullPolicy: Never
        command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=1", "--hostname=worker@%h"]
        envFrom:
        - configMapRef:
            name: trustflow-config
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: trustflow-secrets
              key: groq-api-key
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustflow-secrets
              key: jwt-secret-key
        - name: DB_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: trustflow-secrets
              key: db-encryption-key
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
        - name: db-storage
          mountPath: /app/data
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: uploads-pvc
      - name: db-storage
        persistentVolumeClaim:
          claimName: db-pvc
